<html>
<head>
    <title>TEXT</title>
    <style>
        body {
            font-family: verdana;
            font-size: 24pt;
            color: green;
        }
        div {
            font-family: "Courier New";
            font-size: 12pt;
            color: red;
        }
        .paragraph {
            font-family: "arial";
            font-size: 20pt;
            color: blue;
        }
        .p1{
            font-family: "times new roman";
        }
        .p2{
            font-family: "helvetica";
        }
        .p3{
            font-family: "courier";
        }

    </style>
     </head>
     <body>
        Hello World
        <div>
            Hello world
        </div>
        <div class="paragraph">
            Hello world
        </div>
        <div>
            Hello world
        </div>
        Hello world
        <p class="p1">Paragraph</p>
        <p class="p2">Paragraph</p>
        <p class="p3">Paragraph</p>
     </body>
</html>
